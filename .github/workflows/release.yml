name: Build & Release

# Triggers:
#   - Every push/merge to main  → auto-bumps patch version, builds, releases
#   - Manual run               → choose bump type (patch / minor / major)
#
# Conventional commit prefixes that influence the bump:
#   feat:            → minor  (e.g. "feat: add AI difficulty levels")
#   fix: / chore:    → patch  (default)
#   BREAKING CHANGE  → major

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: false
        default: patch
        type: choice
        options: [patch, minor, major]

permissions:
  contents: write

jobs:
  release:
    name: Auto-tag & Release
    runs-on: macos-15

    steps:
      - name: Checkout (full history for tag detection)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Auto-bump version tag ─────────────────────────────────────────────
      # Reads the last vX.Y.Z tag, bumps based on commit messages,
      # creates + pushes the new tag, and exposes it as outputs.new_tag
      - name: Bump version & tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: ${{ github.event.inputs.bump || 'patch' }}
          # feat:           → minor
          # fix:/chore:     → patch
          # BREAKING CHANGE → major
          tag_prefix: v

      - name: Show new version
        run: echo "New version → ${{ steps.tag.outputs.new_tag }}"

      # ── Build & package ───────────────────────────────────────────────────
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build (release)
        run: swift build -c release

      - name: Create .app bundle
        run: |
          APP=Connect5.app
          rm -rf "$APP"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp .build/release/Connect5 "$APP/Contents/MacOS/Connect5"
          chmod +x "$APP/Contents/MacOS/Connect5"

          VERSION=${{ steps.tag.outputs.new_version }}   # e.g. 1.2.3 (no "v")

          cat > "$APP/Contents/Info.plist" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>        <string>Connect5</string>
              <key>CFBundleIdentifier</key>        <string>com.user.connect5</string>
              <key>CFBundleName</key>              <string>Connect5</string>
              <key>CFBundleDisplayName</key>       <string>Connect 5</string>
              <key>CFBundleVersion</key>           <string>${VERSION}</string>
              <key>CFBundleShortVersionString</key><string>${VERSION}</string>
              <key>CFBundlePackageType</key>       <string>APPL</string>
              <key>NSPrincipalClass</key>          <string>NSApplication</string>
              <key>NSHighResolutionCapable</key>   <true/>
              <key>CFBundleIconFile</key>          <string>AppIcon</string>
              <key>LSMinimumSystemVersion</key>    <string>13.0</string>
              <key>LSApplicationCategoryType</key> <string>public.app-category.games</string>
          </dict>
          </plist>
          EOF

      - name: Generate icon
        run: swift Scripts/make_icon.swift Connect5.app/Contents/Resources/AppIcon.icns

      - name: Sign (ad-hoc)
        run: |
          xattr -cr Connect5.app
          codesign --sign - --force --deep Connect5.app

      - name: Create DMG
        run: |
          TAG=${{ steps.tag.outputs.new_tag }}
          DMG="Connect5-${TAG}-macOS.dmg"

          mkdir -p dmg_staging
          cp -r Connect5.app dmg_staging/
          ln -s /Applications dmg_staging/Applications

          hdiutil create -volname "Connect 5" -srcfolder dmg_staging -ov -format UDRW /tmp/Connect5-rw.dmg
          hdiutil convert /tmp/Connect5-rw.dmg -format UDZO -o "$DMG"

          echo "DMG_PATH=$DMG" >> "$GITHUB_ENV"

      - name: Create ZIP
        run: |
          TAG=${{ steps.tag.outputs.new_tag }}
          ZIP="Connect5-${TAG}-macOS.zip"
          ditto -c -k --sequesterRsrc --keepParent Connect5.app "$ZIP"
          echo "ZIP_PATH=$ZIP" >> "$GITHUB_ENV"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Connect5-macOS-${{ steps.tag.outputs.new_tag }}
          path: |
            ${{ env.DMG_PATH }}
            ${{ env.ZIP_PATH }}
          retention-days: 30

      # ── Publish GitHub Release ─────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: "Connect 5 ${{ steps.tag.outputs.new_tag }}"
          body: |
            ## Connect 5 (Gomoku) ${{ steps.tag.outputs.new_tag }}

            ${{ steps.tag.outputs.changelog }}

            ---
            ### Install
            1. Download **Connect5-${{ steps.tag.outputs.new_tag }}-macOS.dmg**
            2. Open the DMG → drag **Connect5** into **Applications**
            3. First launch: right-click → **Open** (bypasses Gatekeeper for unsigned apps)

            ### Requirements
            macOS 13 Ventura or later (Apple Silicon & Intel)
          files: |
            ${{ env.DMG_PATH }}
            ${{ env.ZIP_PATH }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
